name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Compile Syntax Check
      run: |
        python -m compileall -q orchestrator.py mock_server.py session_state.py agent.py audio_bridge.py
        
    - name: Run Fast Unit Tests
      run: |
        # Run tests that do not require external API keys
        pytest test_session_state.py test_audio_bridge.py voice_agent_eval/test_goal_satisfaction.py -v
